openapi: 3.1.0
info:
  title: Headroom Management API
  description: |
    Management and observability endpoints for the Headroom context compression proxy.
    
    These endpoints are served by the Python management layer alongside the Rust
    reverse proxy. They require admin API key authentication when configured.
    
    **Authentication:** When `HEADROOM_ADMIN_API_KEY` is set, all management
    endpoints require either:
    - `Authorization: Bearer <admin-api-key>` header
    - `X-Headroom-Admin-Key: <admin-api-key>` header
    
    When no admin API key is configured, endpoints are open (backward-compatible).
  version: "0.25.0"
  contact:
    name: Headroom Labs
    email: hello@headroomlabs.ai
    url: https://headroomlabs.ai
  license:
    name: Headroom Commercial License
    url: https://headroomlabs.ai/legal/commercial-license

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://proxy.headroomlabs.ai
    description: Cloud proxy

security:
  - BearerAuth: []
  - AdminKeyHeader: []

tags:
  - name: Health
    description: Liveness, readiness, and startup probes
  - name: Observability
    description: Metrics, statistics, and transformation feed
  - name: Admin
    description: Administrative operations (stats reset)

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Combined liveness and startup probe. Returns 200 when the proxy
        is alive and has finished initialization. Use as both liveness
        and startup probe in Kubernetes.
      operationId: healthz
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Unhealthy

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      description: |
        Returns 200 when the proxy is ready to accept traffic.
        Use as the readiness probe in Kubernetes.
      operationId: readyz
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Not ready

  /livez:
    get:
      tags: [Health]
      summary: Liveness check
      description: |
        Returns 200 when the proxy process is alive.
        Use as the liveness probe in Kubernetes.
      operationId: livez
      security: []
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Dead

  /dashboard:
    get:
      tags: [Admin]
      summary: Web dashboard
      description: |
        Returns the HTML dashboard page showing real-time compression
        statistics, savings, and transformation feed.
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard HTML
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized (admin API key required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      tags: [Observability]
      summary: Get statistics
      description: |
        Returns current proxy statistics including compression ratio,
        total requests, tokens saved, error rates, and CCR metrics.
      operationId: getStats
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/reset:
    post:
      tags: [Admin]
      summary: Reset statistics
      description: |
        Resets all accumulated statistics to zero. Requires admin API key
        AND loopback access (localhost only). This is a destructive operation.
      operationId: resetStats
      responses:
        "200":
          description: Statistics reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not from loopback)

  /stats-history:
    get:
      tags: [Observability]
      summary: Statistics history
      description: |
        Returns historical statistics data points for time-series
        visualization. Data is sampled at regular intervals.
      operationId: getStatsHistory
      parameters:
        - name: interval
          in: query
          description: Sampling interval (e.g., "1m", "5m", "1h")
          schema:
            type: string
            default: "5m"
        - name: limit
          in: query
          description: Maximum number of data points
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Statistics history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsHistoryResponse"
        "401":
          description: Unauthorized

  /transformations/feed:
    get:
      tags: [Observability]
      summary: Live transformation feed
      description: |
        Returns a stream of recent compression transformations. Each entry
        shows the original content, compressed content, strategy used, and
        token savings. Useful for debugging and monitoring compression quality.
      operationId: getTransformationFeed
      parameters:
        - name: limit
          in: query
          description: Maximum number of recent transformations
          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        "200":
          description: Transformation entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationFeedResponse"
        "401":
          description: Unauthorized

  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics
      description: |
        Returns metrics in Prometheus exposition format. No authentication
        required. Configure Prometheus to scrape this endpoint.
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /v1/license/activate:
    post:
      tags: [Admin]
      summary: Activate a license instance
      description: Register a proxy instance activation against a license key.
      operationId: activateLicense
      security: []
      responses:
        "200":
          description: Activated
        "401":
          description: Invalid license
        "403":
          description: Revoked or expired

  /v1/license/crl:
    get:
      tags: [Admin]
      summary: Get Certificate Revocation List
      description: Returns the list of revoked license keys.
      operationId: getCRL
      security: []
      responses:
        "200":
          description: CRL

  /v1/license/checkout-seat:
    post:
      tags: [Admin]
      summary: Checkout a seat lease
      description: Lease a seat for a user.
      operationId: checkoutSeat
      security: []
      responses:
        "200":
          description: Seat leased
        "429":
          description: No seats available

  /v1/license/start-trial:
    post:
      tags: [Admin]
      summary: Start a trial
      description: Start a 14-day server-side trial.
      operationId: startTrial
      security: []
      responses:
        "200":
          description: Trial started
        "409":
          description: Trial already exists

  /v1/license/check-trial:
    post:
      tags: [Admin]
      summary: Check trial status
      description: Check if a trial is active.
      operationId: checkTrial
      security: []
      responses:
        "200":
          description: Trial status

  /v1/spend/events:
    post:
      tags: [Spend Ledger]
      summary: Ingest spend events
      operationId: ingestSpend
      responses:
        "202":
          description: Accepted
  /v1/spend/query:
    get:
      tags: [Spend Ledger]
      summary: Query spend
      operationId: querySpend
      responses:
        "200":
          description: Spend result
  /v1/spend/export/csv:
    get:
      tags: [Spend Ledger]
      summary: Export spend to CSV
      operationId: exportSpendCsv
      responses:
        "200":
          description: CSV data
  /v1/spend/dashboard:
    get:
      tags: [Spend Ledger]
      summary: Spend dashboard
      operationId: getSpendDashboard
      responses:
        "200":
          description: HTML dashboard

  /v1/policies:
    post:
      tags: [Policy]
      summary: Create or update policy
      operationId: upsertPolicy
      responses:
        "200":
          description: Policy created
  /v1/policies/{org_id}/signed:
    get:
      tags: [Policy]
      summary: Get signed policy
      operationId: getSignedPolicy
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signed policy

  /v1/audit/events:
    post:
      tags: [Audit]
      summary: Append audit event
      operationId: appendAudit
      responses:
        "200":
          description: Appended
  /v1/audit/events/{tenant_id}:
    get:
      tags: [Audit]
      summary: Get audit events
      operationId: getAudit
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit events
  /v1/audit/verify/{tenant_id}:
    get:
      tags: [Audit]
      summary: Verify audit chain
      operationId: verifyAudit
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification status
          
  /v1/memory/sync:
    post:
      tags: [Team Memory]
      summary: Sync memory deltas
      operationId: syncMemory
      responses:
        "200":
          description: Sync response
          
  /v1/memory/query:
    post:
      tags: [Team Memory]
      summary: Query memory
      operationId: queryMemory
      responses:
        "200":
          description: Query results

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Admin API key as Bearer token
    AdminKeyHeader:
      type: apiKey
      in: header
      name: X-Headroom-Admin-Key
      description: Admin API key in custom header

  schemas:
    HealthResponse:
      type: object
      properties:
        service:
          type: string
          example: "headroom-proxy"
        status:
          type: string
          example: "healthy"
        alive:
          type: boolean
          example: true
        version:
          type: string
          example: "0.25.0"
        timestamp:
          type: string
          format: date-time
        uptime_seconds:
          type: number
          format: double

    StatsResponse:
      type: object
      properties:
        compression_enabled:
          type: boolean
        compression_mode:
          type: string
        total_requests:
          type: integer
        total_tokens_requested:
          type: integer
        total_tokens_saved:
          type: integer
        compression_ratio:
          type: number
          format: double
          description: "Average compression ratio (0.0 - 1.0)"
        requests_by_auth_mode:
          type: object
          additionalProperties:
            type: integer
        error_count:
          type: integer
        ccr_store_size:
          type: integer
          description: "Number of entries in the CCR cache"
        ccr_hits:
          type: integer
        ccr_misses:
          type: integer
        savings_history_available:
          type: boolean
        license_status:
          type: string
          enum: [active, trial, expired, none]
        uptime_seconds:
          type: number

    StatsHistoryResponse:
      type: object
      properties:
        interval:
          type: string
        data_points:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              compression_ratio:
                type: number
              tokens_saved:
                type: integer
              requests:
                type: integer

    TransformationFeedResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              strategy:
                type: string
                description: "Compression strategy used"
              original_tokens:
                type: integer
              compressed_tokens:
                type: integer
              savings_pct:
                type: number
              content_type:
                type: string

    ResetResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        reset_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        status_code:
          type: integer
