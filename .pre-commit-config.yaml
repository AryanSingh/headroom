repos:
  - repo: local
    hooks:
      - id: sync-plugin-versions
        name: Sync plugin versions
        entry: python3 scripts/sync-plugin-versions.py
        language: system
        pass_filenames: false
        always_run: true
      - id: dashboard-eslint
        name: Dashboard ESLint
        entry: bash -lc 'cd dashboard && npm run lint'
        language: system
        pass_filenames: false
        files: ^dashboard/
      - id: text-hygiene
        name: Text hygiene
        entry: python3 scripts/check_text_hygiene.py
        language: system
        pass_filenames: true
        types_or: [python, markdown, yaml, toml, json]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^experiments/
      - id: ruff-format
        exclude: ^experiments/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        exclude: ^experiments/
        pass_filenames: false
        entry: mypy cutctx
