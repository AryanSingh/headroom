apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headroom.fullname" . }}
  labels:
    {{- include "headroom.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "headroom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "headroom.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "headroom.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.proxy.port }}
              protocol: TCP
          env:
            - name: CUTCTX_HOST
              value: "0.0.0.0"
            - name: CUTCTX_PORT
              value: "{{ .Values.proxy.port }}"
            - name: CUTCTX_PROXY_COMPRESSION
              value: "{{ .Values.proxy.compression }}"
            - name: CUTCTX_PROXY_COMPRESSION_MODE
              value: "{{ .Values.proxy.compressionMode }}"
            - name: CUTCTX_BACKEND
              value: "{{ .Values.proxy.backend }}"
            - name: CUTCTX_MODE
              value: "{{ .Values.proxy.mode }}"
            - name: CUTCTX_MAX_BODY_MB
              value: "{{ .Values.proxy.maxBodyMb }}"
            - name: CUTCTX_AUDIT_DISABLED
              value: "{{ if .Values.audit.enabled }}0{{ else }}1{{ end }}"
            {{- if .Values.proxy.upstream }}
            - name: CUTCTX_PROXY_UPSTREAM
              value: "{{ .Values.proxy.upstream }}"
            {{- end }}
            {{- if .Values.enterprise.adminApiKey }}
            - name: CUTCTX_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "headroom.fullname" . }}-secrets
                  key: admin-api-key
            {{- end }}
            {{- if .Values.enterprise.entitlementTier }}
            - name: CUTCTX_ENTITLEMENT_TIER
              value: "{{ .Values.enterprise.entitlementTier }}"
            {{- end }}
            {{- if .Values.sso.enabled }}
            - name: CUTCTX_SSO_PROVIDER_TYPE
              value: "{{ .Values.sso.providerType }}"
            - name: CUTCTX_SSO_DISCOVERY_URL
              value: "{{ .Values.sso.discoveryUrl }}"
            - name: CUTCTX_SSO_JWKS_URI
              value: "{{ .Values.sso.jwksUri }}"
            - name: CUTCTX_SSO_ISSUER
              value: "{{ .Values.sso.issuer }}"
            - name: CUTCTX_SSO_AUDIENCE
              value: "{{ .Values.sso.audience }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
