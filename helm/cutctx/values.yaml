# CutCtx Helm Chart — Default Values
# Override via: helm install cutctx . -f custom-values.yaml
# Or: helm install cutctx . --set key=value

replicaCount: 2

image:
  repository: ghcr.io/chopratejas/cutctx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Proxy Configuration ───────────────────────────────────────────────
proxy:
  # Compression master switch
  compression: true
  # Compression mode: "off" or "live_zone"
  compressionMode: "live_zone"
  # Backend: "anthropic", "litellm-*", or "anyllm"
  backend: "anthropic"
  # Optimization mode: "token" or "cache"
  mode: "token"
  # Upstream URL (REQUIRED)
  upstream: ""
  # Listen port (inside the container)
  port: 8080
  # Max body size for compression (MB)
  maxBodyMb: 50

# ── Enterprise Features ───────────────────────────────────────────────
enterprise:
  adminApiKey: ""
  corsOrigins: ""
  entitlementTier: ""

# ── SSO / OIDC ────────────────────────────────────────────────────────
sso:
  enabled: false
  providerType: "oidc"
  discoveryUrl: ""
  jwksUri: ""
  issuer: ""
  audience: ""

# ── Audit & Retention ─────────────────────────────────────────────────
audit:
  enabled: true

retention:
  ccrMaxAgeSeconds: 604800
  auditMaxAgeDays: 90
  episodicMaxAgeDays: 30

# ── Resource Limits ───────────────────────────────────────────────────
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# ── Probes ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# ── Autoscaling ───────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Pod Disruption Budget ─────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Service ───────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── Ingress ───────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cutctx.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Security Context ──────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ── Service Account ───────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── RBAC ──────────────────────────────────────────────────────────────
rbac:
  create: true

# ── Node / Pod Scheduling ─────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# ── Environment Variables (extra) ─────────────────────────────────────
extraEnv: []
# - name: HEADROOM_LICENSE_KEY
#   valueFrom:
#     secretKeyRef:
#       name: cutctx-secrets
#       key: license-key

# ── Volumes / Mounts ──────────────────────────────────────────────────
extraVolumes: []
extraVolumeMounts: []
