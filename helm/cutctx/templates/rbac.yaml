{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cutctx.fullname" . }}
  labels:
    {{- include "cutctx.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cutctx.fullname" . }}
  labels:
    {{- include "cutctx.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cutctx.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "cutctx.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
