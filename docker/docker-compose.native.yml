services:
  cli:
    # Medium-35 (production-audit-progress-2026-06-20.md): align
    # the docker-compose.native.yml image reference with the
    # canonical owner (aryansingh) used by the Helm chart and
    # the github container registry. The old cutctx/cutctx
    # reference is a stale pre-rebrand artifact; the new
    # cutctx/cutctx reference matches helm/cutctx/values.yaml.
    image: ${CUTCTX_IMAGE:-ghcr.io/cutctx/cutctx:latest}
    entrypoint: ["cutctx"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      HOME: /tmp/cutctx-home
      # Canonical Cutctx filesystem contract (issue #175). Forwarded into
      # the container so the proxy resolves state/config to the bind-mounted
      # /tmp/cutctx-home/.cutctx path. CUTCTX_WORKSPACE (above) remains
      # the Docker bind-mount source and is intentionally different.
      CUTCTX_WORKSPACE_DIR: /tmp/cutctx-home/.cutctx
      CUTCTX_CONFIG_DIR: /tmp/cutctx-home/.cutctx/config
    volumes:
      - ${CUTCTX_WORKSPACE:-.}:/workspace
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.cutctx:/tmp/cutctx-home/.cutctx
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.claude:/tmp/cutctx-home/.claude
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.codex:/tmp/cutctx-home/.codex
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.gemini:/tmp/cutctx-home/.gemini
    command: ["--help"]

  proxy:
    image: ${CUTCTX_IMAGE:-ghcr.io/cutctx/cutctx:latest}
    entrypoint: ["cutctx", "proxy"]
    working_dir: /workspace
    restart: unless-stopped
    environment:
      HOME: /tmp/cutctx-home
      CUTCTX_HOST: 0.0.0.0
      CUTCTX_ADMIN_API_KEY: ${CUTCTX_ADMIN_API_KEY:-ci-native-e2e-key}
      # A non-loopback proxy requires a distinct client key. Pass through an
      # operator-supplied value; leaving it empty preserves the fail-closed
      # deployment guard rather than silently sharing the admin credential.
      CUTCTX_PROXY_API_KEY: ${CUTCTX_PROXY_API_KEY:-}
      # Canonical Cutctx filesystem contract (issue #175). See `cli` service
      # above for rationale.
      CUTCTX_WORKSPACE_DIR: /tmp/cutctx-home/.cutctx
      CUTCTX_CONFIG_DIR: /tmp/cutctx-home/.cutctx/config
    ports:
      - "${CUTCTX_PORT:-8787}:${CUTCTX_PORT:-8787}"
    volumes:
      - ${CUTCTX_WORKSPACE:-.}:/workspace
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.cutctx:/tmp/cutctx-home/.cutctx
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.claude:/tmp/cutctx-home/.claude
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.codex:/tmp/cutctx-home/.codex
      - ${CUTCTX_HOST_HOME:?set CUTCTX_HOST_HOME}/.gemini:/tmp/cutctx-home/.gemini
    command: ["--host", "0.0.0.0", "--port", "${CUTCTX_PORT:-8787}"]
