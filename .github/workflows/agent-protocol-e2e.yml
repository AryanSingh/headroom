name: Agent Protocol E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:
    inputs:
      run_live:
        description: Run credentialed Codex and Claude CLI canaries
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: agent-protocol-e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PY_VERSION: "3.12"
  CODEX_PINNED_VERSION: "0.144.6"
  CLAUDE_PINNED_VERSION: "2.1.215"

jobs:
  hermetic-replay:
    name: Hermetic proxy replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install test runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-timeout

      - name: Run sanitized real-network replay gate
        env:
          CUTCTX_TELEMETRY: "off"
          CUTCTX_NO_SUBSCRIPTION_TRACKING: "1"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest \
            tests/agent_e2e \
            tests/test_network_diff_capture.py \
            tests/test_live_agent_protocol_canary.py \
            tests/test_openai_responses_subscription_compat.py \
            tests/test_openai_codex_routing.py

  live-cli:
    name: Live CLI restart and resume
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_live)
    needs: hermetic-replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      CUTCTX_TELEMETRY: "off"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Require dedicated live credentials
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is required for scheduled live protocol tests"
            exit 1
          fi
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::CODEX_AUTH_JSON is required for scheduled ChatGPT subscription tests"
            exit 1
          fi

      - name: Install Cutctx
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Configure isolated Codex authentication
        run: |
          install -d -m 700 "$RUNNER_TEMP/codex-home"
          printf '%s' "$CODEX_AUTH_JSON" > "$RUNNER_TEMP/codex-home/auth.json"
          chmod 600 "$RUNNER_TEMP/codex-home/auth.json"

      - name: Run pinned client canaries
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          mkdir -p "$RUNNER_TEMP/agent-protocol-artifacts"
          npm install --global \
            "@openai/codex@${CODEX_PINNED_VERSION}" \
            "@anthropic-ai/claude-code@${CLAUDE_PINNED_VERSION}"
          python scripts/live_agent_protocol_canary.py \
            --client codex \
            --budget-usd 1.25 \
            --port 18787 \
            --artifact "$RUNNER_TEMP/agent-protocol-artifacts/codex-pinned.json"
          python scripts/live_agent_protocol_canary.py \
            --client claude \
            --budget-usd 1.25 \
            --port 18788 \
            --artifact "$RUNNER_TEMP/agent-protocol-artifacts/claude-pinned.json"

      - name: Run latest client drift canaries
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          npm install --global \
            "@openai/codex@latest" \
            "@anthropic-ai/claude-code@latest"
          python scripts/live_agent_protocol_canary.py \
            --client codex \
            --budget-usd 1.25 \
            --port 18789 \
            --artifact "$RUNNER_TEMP/agent-protocol-artifacts/codex-latest.json"
          python scripts/live_agent_protocol_canary.py \
            --client claude \
            --budget-usd 1.25 \
            --port 18790 \
            --artifact "$RUNNER_TEMP/agent-protocol-artifacts/claude-latest.json"

      - name: Upload sanitized protocol summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-protocol-live-${{ github.run_number }}
          path: ${{ runner.temp }}/agent-protocol-artifacts/
          if-no-files-found: warn
          retention-days: 14
