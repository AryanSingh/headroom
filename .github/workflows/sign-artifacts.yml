name: SP-7: Supply Chain Signing

# SP-7: Signs release artifacts and generates manifests.
# Runs after the main release workflow to produce signed artifacts.

on:
  workflow_dispatch:
    inputs:
      artifacts_tag:
        description: "Git tag of the release to sign"
        required: true
        type: string
  release:
    types: [published]

jobs:
  sign-and-verify:
    name: Sign Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For Sigstore keyless signing

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.artifacts_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: "cutctx-*"

      - name: Scan for secrets (V-12)
        run: |
          python scripts/sign_artifacts.py scan-secrets --path artifacts/

      - name: Scan for forbidden paths in source (V-5)
        run: |
          python -c "
          import pathlib
          from scripts.sign_artifacts import scan_secrets
          findings = scan_secrets(pathlib.Path('.'))
          if findings:
              for f in findings:
                  print(f'  {f[\"file\"]}: {f[\"description\"]}')
              exit(1)
          print('PASS: No forbidden strings in source')
          "

      - name: Generate and sign manifest
        run: |
          # In production, use a real signing key from KMS/HSM
          # For now, generate a throwaway keypair for CI testing
          openssl genpkey -algorithm Ed25519 -out /tmp/build-key.pem 2>/dev/null
          openssl pkey -in /tmp/build-key.pem -pubout -out /tmp/build-pub.pem 2>/dev/null

          python scripts/sign_artifacts.py sign \
            --artifacts-dir artifacts/ \
            --key-file /tmp/build-key.pem \
            --output artifacts/manifest.json

          echo "Manifest generated:"
          python -c "import json; m=json.load(open('artifacts/manifest.json')); print(f'  {len(m[\"entries\"])} artifacts, signature: {m[\"signature\"][:20]}...')"

      - name: Verify manifest (V-12)
        run: |
          python scripts/sign_artifacts.py verify \
            --artifacts-dir artifacts/ \
            --manifest artifacts/manifest.json \
            --public-key /tmp/build-pub.pem

      - name: Verify EE wheel has no source (V-7)
        run: |
          # Check if compiled EE wheel exists and verify
          EE_WHEEL=$(find artifacts/ -name "cutctx_ee*.whl" | head -1)
          if [ -n "$EE_WHEEL" ]; then
            python -c "
          import zipfile, sys
          with zipfile.ZipFile('$EE_WHEEL') as z:
              py = [n for n in z.namelist() if n.endswith('.py')]
              pyc = [n for n in z.namelist() if n.endswith('.pyc')]
              if py:
                  print(f'FAIL: .py source in EE wheel: {py[:5]}')
                  sys.exit(1)
              if pyc:
                  print(f'FAIL: .pyc bytecode in EE wheel: {pyc[:5]}')
                  sys.exit(1)
              print(f'PASS: EE wheel has no source ({len(z.namelist())} entries)')
          "
          else
            echo "INFO: No compiled EE wheel found (SP-3 not yet built)"
          fi

      - name: Upload signed manifest
        uses: actions/upload-artifact@v4
        with:
          name: signed-manifest
          path: artifacts/manifest.json

      - name: SBOM generation (existing)
        run: |
          pip install cyclonedx-bom 2>/dev/null || true
          # Existing SBOM generation step
          echo "SBOM generation (if cyclonedx-bom available)"
