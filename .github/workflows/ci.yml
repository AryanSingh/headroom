name: CI

# Intelligent + parallel pipeline (cutover from the old 4-version matrix):
#   changes      — paths-filter; skips heavy work for docs-only changes
#   build-wheel  — compile the Rust ext ONCE (fast `ci` cargo profile), share via artifact
#   lint         — ruff + mypy, once
#   prefetch-model — download the embedding model ONCE (authenticated), warm shared cache
#   test         — 4 parallel shards (pytest-split), each a fresh runner VM; run offline
#   test-extras / test-agno / build / commitlint / workflow-validation / *-e2e — preserved
#
# Notes: CPU-only torch everywhere (no CUDA stack); test shards run HF_HUB_OFFLINE.
# Multi-version (3.10/3.11/3.13) coverage on main is a planned follow-up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs/branches, but never cancel a main build.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PY_VERSION: "3.12"
  # CPU-only torch — runners have no GPU; the default CUDA wheels pull ~2.5 GB.
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'cutctx/**'
              - 'crates/**'
              - '**/*.rs'
              - 'pyproject.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tests/**'
              - 'scripts/**'
              - 'helm/**'
              - 'k8s/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'cutctx/**'
              - 'crates/**'
              - 'docker/**'
              - 'helm/**'
              - 'k8s/**'
              - 'Dockerfile'
              - 'e2e/**'
              - 'scripts/install*'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - run: pip install --upgrade pip ruff==0.9.4 mypy==1.15.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy
        continue-on-error: true
        run: mypy cutctx --ignore-missing-imports
      - name: Python compile smoke
        run: python -m compileall -q cutctx cutctx_ee
      - name: repo hygiene
        run: python scripts/check_repo_hygiene.py

  build-wheel:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build dashboard package assets
        run: |
          npm --prefix dashboard ci
          npm --prefix dashboard run build
          python scripts/sync_dashboard_assets.py
      - name: Build wheel once (fast CI cargo profile)
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --profile ci --out dist --interpreter "python${PY_VERSION}"
      - name: Leak guard — OSS wheel must not contain cutctx_ee
        run: python3 scripts/assert_oss_wheel_clean.py dist
      - uses: actions/upload-artifact@v7
        with:
          name: cutctx-wheel
          path: dist/*.whl
          retention-days: 1

  prefetch-model:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Cache HuggingFace model
        id: hfcache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-models-allMiniLM-v2
      - name: Fetch all-MiniLM-L6-v2 once (authenticated, resilient)
        if: steps.hfcache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          python -m pip install --upgrade pip huggingface_hub
          for i in 1 2 3 4 5 6; do
            if python -c "from huggingface_hub import snapshot_download; snapshot_download('sentence-transformers/all-MiniLM-L6-v2')"; then exit 0; fi
            echo "::warning::model fetch attempt $i failed; backing off"; sleep $((i * 30))
          done
          echo "::error::could not fetch all-MiniLM-L6-v2 from HuggingFace"; exit 1

  test:
    needs: [changes, build-wheel, prefetch-model]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build dashboard assets for Python audit tests
        run: |
          npm --prefix dashboard ci
          npm --prefix dashboard run build
          python scripts/sync_dashboard_assets.py

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ env.PY_VERSION }}-

      - name: Restore HuggingFace model cache (warmed by prefetch-model)
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-models-allMiniLM-v2

      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist

      - name: Install (CPU torch + prebuilt wheel + dev deps, no cargo rebuild)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev]" pytest-split
          # cwd's ./cutctx source tree shadows the installed wheel; copy the
          # compiled extension in so tests import it (no second cargo build).
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
          python -c "from cutctx._core import DiffCompressor; print('cutctx._core OK')"
          python -m playwright install --with-deps chromium

      - name: Run test shard ${{ matrix.shard }}/4
        run: |
          pytest tests scripts/tests \
            --splits 4 --group ${{ matrix.shard }} \
            --tb=short -q

  test-gate:
    needs: [changes, build-wheel, prefetch-model]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-gate-${{ env.PY_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-gate-${{ env.PY_VERSION }}-
      - name: Restore HuggingFace model cache (warmed by prefetch-model)
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-models-allMiniLM-v2
      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev]"
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
          python -c "from cutctx._core import DiffCompressor; print('cutctx._core OK')"
          python -m playwright install --with-deps chromium
      - name: Build dashboard assets for browser tests
        run: |
          npm --prefix dashboard ci
          npm --prefix dashboard run build
          python scripts/sync_dashboard_assets.py
      - name: Core pytest gate
        run: |
          pytest tests \
            -k "not slow and not real_llm and not live and not e2e" \
            --cov=cutctx --cov-branch --cov-report=xml:coverage-python.xml \
            --cov-report=term-missing --cov-fail-under=70 \
            --tb=short -q
      - name: Upload Python coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage-python.xml
          flags: python
          fail_ci_if_error: true

  security-audit:
    needs: [changes, build-wheel]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit-${{ env.PY_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-audit-${{ env.PY_VERSION }}-
      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist
      - name: Install runtime + audit deps
        run: |
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          # Audit the shipped runtime dependency graph.  The dev extra pulls
          # optional ML packages (including CPU-only Torch from a separate
          # index), which are not part of the published runtime contract and
          # cannot be resolved by PyPI's advisory service.
          pip install "${WHEEL}"
          pip install pip-audit
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
      - name: pip-audit
        # cutctx-ai is the local project and is intentionally not published
        # to PyPI. Audit every external distribution from a frozen snapshot,
        # excluding only that local package so strict mode still catches real
        # third-party vulnerabilities and dependency failures.
        run: |
          pip list --format=freeze \
            | sed -E '/^cutctx-ai[= @]/d' \
            > /tmp/cutctx-audit-requirements.txt
          pip-audit --strict -r /tmp/cutctx-audit-requirements.txt

  test-extras:
    needs: [changes, build-wheel]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-extras-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-extras-
      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.fastembed-cache
          key: ${{ runner.os }}-fastembed-bge-small-v1
      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist
      - name: Install (CPU torch + wheel[dev,relevance])
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev,relevance]"
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
          python -c "from cutctx._core import SmartCrusher; print('cutctx._core OK')"
      - name: Pre-fetch fastembed model (authenticated, resilient)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          for i in 1 2 3 4 5; do
            if python -c "from fastembed import TextEmbedding; TextEmbedding('BAAI/bge-small-en-v1.5')"; then exit 0; fi
            echo "::warning::fastembed fetch attempt $i failed; backing off"; sleep $((i * 20))
          done
          echo "::error::could not fetch fastembed model from HuggingFace"; exit 1
      - name: Run relevance tests
        # Offline so fastembed reads the cache the prefetch step just warmed,
        # without an unauthenticated cache-validation HEAD that could 429.
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pytest tests/test_relevance.py -v

  test-agno:
    needs: [changes, build-wheel]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Download prebuilt wheel
        uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist
      - name: Install (CPU torch + wheel[dev,agno])
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[dev,agno]"
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
      - name: Run agno tests
        run: pytest tests/test_integrations/agno/ -v

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-build-
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      # Smoke check that the SHIPPED build (release profile) + sdist are wired
      # right; release.yml's matrix is what actually publishes to PyPI.
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install 'maturin>=1.5,<2.0' twine
      - name: Build wheel + sdist
        run: |
          maturin sdist --out dist
          maturin build --release --out dist
      - name: Check package
        run: twine check dist/*

  workflow-validation:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Cache actionlint + act
        id: tools-cache
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/actionlint
            /usr/local/bin/act
          # Key off the workflow file itself: when someone updates the
          # download URLs to a newer tool version, the hash changes and
          # the cache busts automatically.
          key: ${{ runner.os }}-ci-tools-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install actionlint
        if: steps.tools-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv ./actionlint /usr/local/bin/actionlint

      - name: Install act
        if: steps.tools-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash
          sudo install ./bin/act /usr/local/bin/act
      - name: Validate workflow files
        run: bash scripts/validate-workflows.sh

  docker-native-e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # The native image binds its proxy on 0.0.0.0 inside Docker, so the
      # deployment-security guard requires explicit, separate test-only keys.
      CUTCTX_ADMIN_API_KEY: ci-native-e2e-key
      CUTCTX_PROXY_API_KEY: ci-native-e2e-proxy-client-key
      CUTCTX_CLIENT_API_KEY: ci-native-e2e-agent-client-key
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build local Cutctx image
        run: docker build -t cutctx-native-e2e:latest .
      - name: Run Docker-native installer e2e
        env:
          CUTCTX_DOCKER_IMAGE: cutctx-native-e2e:latest
        run: bash e2e/docker-native-install.sh
      - name: Run Docker-native compose smoke test
        env:
          CUTCTX_IMAGE: cutctx-native-e2e:latest
          CUTCTX_HOST_HOME: ${{ github.workspace }}
          CUTCTX_WORKSPACE: ${{ github.workspace }}
        run: |
          mkdir -p .cutctx .claude .codex .gemini
          chmod -R a+rwX .cutctx .claude .codex .gemini
          trap 'docker compose -f docker/docker-compose.native.yml down -v' EXIT
          docker compose -f docker/docker-compose.native.yml up -d proxy
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8787/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker compose -f docker/docker-compose.native.yml logs proxy
              exit 1
            fi
            sleep 1
          done
      - name: Run Docker-native wrap e2e
        run: |
          docker build -f e2e/wrap/Dockerfile -t cutctx-wrap-e2e .
          docker run --rm cutctx-wrap-e2e
      - name: Run Docker-native init e2e
        run: |
          docker build -f e2e/init/Dockerfile -t cutctx-init-e2e .
          docker run --rm cutctx-init-e2e

  windows-native-wrapper:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run native installer wrapper tests
        run: pytest tests/test_install/test_native_installers.py -q

  macos-native-wrapper:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install bash and test dependencies
        run: |
          brew install bash
          python -m pip install --upgrade pip
          python -m pip install --retries 10 --timeout 60 pytest
      - name: Run native installer wrapper tests
        run: |
          BASH_PREFIX="$(brew --prefix bash)"
          export PATH="$BASH_PREFIX/bin:$PATH"
          pytest tests/test_install/test_native_installers.py -q

  # Redis-backed orchestration state is a production durability boundary, so
  # exercise it against an actual server rather than a developer-local port.
  redis-orchestration-integration:
    needs: [changes, build-wheel]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CUTCTX_TEST_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          name: cutctx-wheel
          path: dist
      - name: Install Redis integration test dependencies
        run: |
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          pip install "${WHEEL}[orchestration-redis,dev]"
          SITE="$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')"
          cp "${SITE}/cutctx/"_core*.so cutctx/
      - name: Run Redis orchestration integration tests
        run: pytest tests/test_orchestration_redis.py -q
