name: Weekly Benchmark
on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday 02:00 UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - run: uv run python benchmarks/generate_fixtures.py
      - run: uv run python benchmarks/run_comparison.py --output benchmarks/results/latest.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
