apiVersion: v1
kind: Service
metadata:
  name: headroom-proxy
  namespace: headroom
  labels:
    app.kubernetes.io/name: headroom-proxy
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: headroom-proxy
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
