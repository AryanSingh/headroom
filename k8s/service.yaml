apiVersion: v1
kind: Service
metadata:
  name: cutctx-proxy
  namespace: cutctx
  labels:
    app.kubernetes.io/name: cutctx-proxy
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cutctx-proxy
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
