apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cutctx-alerts
  namespace: cutctx
spec:
  groups:
    - name: cutctx.rules
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
        - alert: HighLatency
          expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2.0
          for: 5m
          labels:
            severity: warning
