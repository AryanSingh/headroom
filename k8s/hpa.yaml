apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cutctx-proxy
  namespace: cutctx
  labels:
    app.kubernetes.io/name: cutctx-proxy
    app.kubernetes.io/component: proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cutctx-proxy
  # Do not scale a ReadWriteOnce-backed deployment above one replica. Enable
  # this HPA only after migrating state to shared RWX/external storage.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
