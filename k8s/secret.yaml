apiVersion: v1
kind: Secret
metadata:
  name: headroom-proxy-secret
  namespace: headroom
  labels:
    app.kubernetes.io/name: headroom-proxy
    app.kubernetes.io/component: proxy
type: Opaque
stringData:
  # License key — get from hello@headroomlabs.ai
  HEADROOM_LICENSE_KEY: "YOUR_LICENSE_KEY_HERE"
  # Admin API key — for /dashboard, /stats access
  HEADROOM_ADMIN_API_KEY: "YOUR_ADMIN_API_KEY_HERE"
  # Upstream LLM API key (Anthropic/OpenAI)
  HEADROOM_UPSTREAM_API_KEY: "YOUR_UPSTREAM_API_KEY_HERE"
  # CCR backend encryption key (if using Redis)
  # HEADROOM_CCR_REDIS_URL: "redis://redis:6379"
