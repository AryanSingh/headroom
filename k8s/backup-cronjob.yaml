apiVersion: batch/v1
kind: CronJob
metadata:
  name: headroom-backup
  namespace: headroom
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache sqlite aws-cli
              sqlite3 /data/headroom_memory.db ".backup /tmp/backup.db"
              aws s3 cp /tmp/backup.db s3://headroom-backups/memory-$(date +%s).db
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi
            volumeMounts:
            - name: data-volume
              mountPath: /data
          restartPolicy: OnFailure
          volumes:
          - name: data-volume
            persistentVolumeClaim:
              claimName: headroom-data
