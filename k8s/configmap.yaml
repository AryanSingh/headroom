apiVersion: v1
kind: ConfigMap
metadata:
  name: headroom-proxy-config
  namespace: headroom
  labels:
    app.kubernetes.io/name: headroom-proxy
    app.kubernetes.io/component: proxy
data:
  # Compression — enable by default in K8s
  CUTCTX_PROXY_COMPRESSION: "1"
  CUTCTX_PROXY_COMPRESSION_MODE: "live-zone"
  # Auth mode policy enforcement
  CUTCTX_PROXY_AUTH_MODE_POLICY_ENFORCEMENT: "enabled"
  # Cache control auto-frozen
  CUTCTX_PROXY_CACHE_CONTROL_AUTO_FROZEN: "enabled"
  # Strip internal headers from upstream requests
  CUTCTX_PROXY_STRIP_INTERNAL_HEADERS: "enabled"
  # Body size limit (50MB)
  CUTCTX_MAX_BODY_MB: "50"
  # CORS — closed by default
  CUTCTX_CORS_ORIGINS: ""
  # Logging
  RUST_LOG: "info"
  CUTCTX_LOG_LEVEL: "info"
  # Telemetry — opt-in
  CUTCTX_TELEMETRY_ENABLED: "false"
  # Episodic memory — opt-in
  CUTCTX_EPISODIC_MEMORY_ENABLED: "false"
