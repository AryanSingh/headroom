apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cutctx-proxy-network-policy
  namespace: cutctx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cutctx-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cutctx
      ports:
        - protocol: TCP
          port: 8787
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: UDP
          port: 53
