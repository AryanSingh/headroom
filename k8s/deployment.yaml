apiVersion: apps/v1
kind: Deployment
metadata:
  name: cutctx-proxy
  namespace: cutctx
  labels:
    app.kubernetes.io/name: cutctx-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/version: "0.29.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cutctx-proxy
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cutctx-proxy
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8787"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cutctx-proxy
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cutctx-proxy
          image: ghcr.io/cutctx/cutctx:v0.30.0
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          env:
            - name: CUTCTX_MODE
              value: "token"
            - name: CUTCTX_OPTIMIZE
              value: "1"
          envFrom:
            - configMapRef:
                name: cutctx-proxy-config
            - secretRef:
                name: cutctx-proxy-secret
          args:
            - "--listen-addr"
            - "0.0.0.0:8787"
            - "--max-body-bytes"
            - "52428800"

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          volumeMounts:
            - name: cutctx-data
              mountPath: /home/nonroot/.cutctx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cutctx-data
          persistentVolumeClaim:
            claimName: cutctx-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
