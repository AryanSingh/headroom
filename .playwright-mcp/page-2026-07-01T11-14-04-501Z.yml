            - heading "Quick Start" [level=2] [ref=f7e154]
            - paragraph [ref=f7e155]: Three ways to use Cutctx — proxy, wrap, or inline library. Pick the one that matches your workflow.
            - generic [ref=f7e156]: "# Install (Python) pip install \"cutctx-ai[all]\" # broad bundle — omits some heavy/proprietary extras pip install \"cutctx-ai[proxy,ml]\" # proxy + Kompress-base only # Install (Node / TypeScript) npm install cutctx-ai # Mode 1 — Proxy (zero code changes) cutctx proxy --port 8787 # Then point your agent/client at http://localhost:8787 # Mode 2 — Wrap a coding agent cutctx wrap claude # Claude Code cutctx wrap codex # OpenAI Codex cutctx wrap cursor # Cursor cutctx wrap aider # Aider cutctx wrap copilot # GitHub Copilot CLI # Mode 3 — Inline Python library from cutctx import compress result = await compress(messages, model=\"claude-sonnet-4-6\") # Check savings cutctx perf cutctx savings --by-source --format json"
