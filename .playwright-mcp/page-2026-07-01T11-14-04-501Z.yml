            - heading "Deployment" [level=2] [ref=f7e242]
            - paragraph [ref=f7e243]: Deploy Cutctx as a standalone proxy server using Docker, Kubernetes, or cloud platforms.
            - generic [ref=f7e244]: Docker
            - generic [ref=f7e245]: "docker run -p 4000:4000 \\ -e CUTCTX_ADMIN_API_KEY=your-secure-key \\ -e CUTCTX_UPSTREAM_URL=https://api.anthropic.com \\ cutctx/proxy:latest # Access the proxy at http://localhost:4000 # Health check: curl http://localhost:4000/health"
            - generic [ref=f7e246]: Kubernetes
            - paragraph [ref=f7e247]:
              - text: Deploy using the Helm chart or kubectl manifests. Set
              - code [ref=f7e248]: CUTCTX_UPSTREAM_URL
              - text: to route requests to your LLM provider.
            - generic [ref=f7e249]: Reverse Proxy Setup
            - paragraph [ref=f7e250]: For production deployments, place Cutctx behind a reverse proxy (nginx, Caddy, etc.) forwarding port 443 to port 4000.
            - generic [ref=f7e251]:
              - strong [ref=f7e252]: "Health check endpoint:"
              - code [ref=f7e253]: GET /health
              - text: — returns 200 if the proxy is operational and upstream is reachable.
