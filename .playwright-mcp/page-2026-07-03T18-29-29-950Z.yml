            - paragraph [ref=e255]:
              - text: Deploy using the Helm chart or kubectl manifests. Set
              - code [ref=e256]: CUTCTX_UPSTREAM_URL
              - text: to route requests to your LLM provider.
            - generic [ref=e257]: Reverse Proxy Setup
            - paragraph [ref=e258]: For production deployments, place Cutctx behind a reverse proxy (nginx, Caddy, etc.) forwarding port 443 to port 4000.
            - generic [ref=e259]:
              - strong [ref=e260]: "Health check endpoint:"
              - code [ref=e261]: GET /health
              - text: — returns 200 if the proxy is operational and upstream is reachable.
