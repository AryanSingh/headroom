            - paragraph [ref=e251]: Deploy Cutctx as a standalone proxy server using Docker, Kubernetes, or cloud platforms.
            - generic [ref=e252]: Docker
            - generic [ref=e253]: "docker run -p 4000:4000 \\ -e CUTCTX_ADMIN_API_KEY=your-secure-key \\ -e CUTCTX_UPSTREAM_URL=https://api.anthropic.com \\ cutctx/proxy:latest # Access the proxy at http://localhost:4000 # Health check: curl http://localhost:4000/health"
