services:
  cutctx-proxy:
    build: .
    command: ["--host", "0.0.0.0"]
    environment:
      - CUTCTX_HOST=0.0.0.0
      # Network deployments require three distinct Cutctx credentials. Generate
      # each with: python -c 'import secrets; print(secrets.token_urlsafe(32))'
      - CUTCTX_ADMIN_API_KEY=${CUTCTX_ADMIN_API_KEY:?set CUTCTX_ADMIN_API_KEY}
      - CUTCTX_PROXY_API_KEY=${CUTCTX_PROXY_API_KEY:?set CUTCTX_PROXY_API_KEY}
      - CUTCTX_CLIENT_API_KEY=${CUTCTX_CLIENT_API_KEY:?set CUTCTX_CLIENT_API_KEY}
      # if you want to use a custom OpenAI-compatible API endpoint,
      # uncomment and set the following line with the desired URL
      # - OPENAI_TARGET_API_URL=https://api.x.ai
    ports:
      - "8787:8787"
    volumes:
      - cutctx_data:/home/nonroot/.cutctx
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - qdrant
      - neo4j

  # Vector database for semantic search
  qdrant:
    image: qdrant/qdrant:v1.17.1
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Graph database for relationships and multi-hop reasoning
  neo4j:
    image: neo4j:5.26
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:?set NEO4J_AUTH}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

volumes:
  cutctx_data:
  qdrant_data:
  neo4j_data:
